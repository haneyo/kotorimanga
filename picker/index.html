<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KotoriManga - Google Drive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 360px; }
  .card h2 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .card p { font-size: 14px; color: #666; margin-bottom: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #4285f4; border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>正在完成 Google Drive 操作</h2>
    <p>正在将文件信息传回应用...</p>
  </div>

<script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var scheme = params.get('scheme') || 'kotorimanga';
    var pickedIDs = params.get('picked_file_ids');
    var code = params.get('code');

    if (pickedIDs) {
      // Google Picker 选完文件后的回调 → 传回 App
      var url = scheme + '://picker?ids=' + encodeURIComponent(pickedIDs);
      if (code) url += '&code=' + encodeURIComponent(code);
      window.location.href = url;
    } else {
      document.querySelector('.card h2').textContent = '未选择文件';
      document.querySelector('.card p').textContent = '请返回应用重试。';
      document.querySelector('.spinner').style.display = 'none';
    }
  })();
</script>
</body>
</html>
