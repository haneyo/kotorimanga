<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: white; overflow: hidden; font-family: -apple-system, sans-serif; }
  #picker-container { width: 100vw; height: 100vh; position: relative; }
  #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 24px; }
  #login-container h2 { font-size: 22px; color: #333; margin-bottom: 12px; font-weight: 500; }
  #login-container p { font-size: 14px; color: #666; margin-bottom: 32px; text-align: center; }
  #login-btn { padding: 14px 36px; font-size: 16px; background: #4285f4; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
  #login-btn:hover { background: #3367d6; }
  #loading { font-size: 16px; color: #666; }
  #error { color: #d93025; font-size: 14px; text-align: center; display: none; margin-top: 16px; }
</style>
</head>
<body>
<div id="picker-container">
  <div id="login-container">
    <h2 id="status-title">准备中...</h2>
    <p id="status-desc">正在启动 Google 登录</p>
    <div id="loading">⏳ 请稍候</div>
    <div id="error"></div>
    <button id="login-btn" style="display:none;" onclick="startOAuth()">使用 Google 账号登录</button>
  </div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client"></script>
<!-- Google Picker API -->
<script async defer src="https://apis.google.com/js/api.js"></script>

<script type="text/javascript">
  var params = new URLSearchParams(window.location.search);
  var API_KEY = params.get('key');
  var SCHEME = params.get('scheme') || 'kotorimanga';

  // 如果没有 API Key，显示错误
  if (!API_KEY) {
    showError('缺少 API Key 参数');
  }

  var CLIENT_ID = '798405617409-7orp581n5cno3m32f06i76mtqo7msi0o.apps.googleusercontent.com';
  var ACCESS_TOKEN = null;

  // 尝试从 URL fragment 中读取 token（OAuth redirect 模式返回）
  if (window.location.hash) {
    var hashParams = new URLSearchParams(window.location.hash.substring(1));
    var hashToken = hashParams.get('access_token');
    if (hashToken) {
      ACCESS_TOKEN = hashToken;
      // 清除 hash，避免页面刷新后重复解析
      history.replaceState(null, null, window.location.pathname + window.location.search);
    }
  }

  // 检查 URL 参数中是否有预设 token（App 传入）
  var urlToken = params.get('token');
  if (urlToken) {
    ACCESS_TOKEN = urlToken;
  }

  // 准备好后加载 Picker
  if (ACCESS_TOKEN) {
    showLoading('正在加载文件选择器...');
    gapi.load('picker', { callback: onPickerApiLoad });
  } else {
    // 没有 token，显示登录按钮
    showLoginScreen();
  }

  function showLoginScreen() {
    document.getElementById('status-title').textContent = '请登录 Google 账号';
    document.getElementById('status-desc').textContent = '需要登录后才能浏览您的 Google 云端硬盘文件';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-btn').style.display = 'inline-block';
  }

  function showLoading(text) {
    document.getElementById('status-title').textContent = text || '加载中...';
    document.getElementById('status-desc').textContent = '';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('error').style.display = 'none';
  }

  function showError(msg) {
    document.getElementById('status-title').textContent = '出错了';
    document.getElementById('status-desc').textContent = '';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-btn').style.display = 'none';
    var errEl = document.getElementById('error');
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  function startOAuth() {
    showLoading('正在打开 Google 登录...');
    document.getElementById('login-btn').style.display = 'none';

    try {
      var client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: function(response) {
          if (response && response.access_token) {
            ACCESS_TOKEN = response.access_token;
            showLoading('登录成功，正在加载文件选择器...');
            gapi.load('picker', { callback: onPickerApiLoad });
          } else if (response && response.error) {
            if (response.error === 'user_cancelled' || response.error === 'access_denied') {
              window.location.href = SCHEME + '://picker?cancel=1';
            } else {
              showError('登录失败：' + response.error);
            }
          }
        },
        error_callback: function(err) {
          console.error('GIS error:', err);
          // 弹出窗口可能被 WKWebView 阻止，尝试重新显示按钮
          showLoginScreen();
          document.getElementById('status-desc').textContent = '登录弹窗被阻止，请再次点击按钮重试（错误：' + (err.type || 'unknown') + '）';
        }
      });
      client.requestAccessToken();
    } catch(e) {
      console.error('OAuth error:', e);
      showError('启动登录失败：' + e.message);
      // 5 秒后重新显示登录按钮
      setTimeout(showLoginScreen, 5000);
    }
  }

  function onPickerApiLoad() {
    if (!ACCESS_TOKEN) {
      showError('缺少访问令牌');
      return;
    }

    var view = new google.picker.View(google.picker.ViewId.DOCS_IMAGES_AND_VIDEOS);
    view.setMimeTypes('application/zip,application/x-cbz,application/x-cbr,application/x-rar,application/pdf,application/epub+zip,image/jpeg,image/png,image/gif,image/webp,application/vnd.google-apps.folder');

    var picker = new google.picker.PickerBuilder()
        .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
        .enableFeature(google.picker.Feature.NAV_HIDDEN)
        .setTitle('选择漫画文件')
        .setOAuthToken(ACCESS_TOKEN)
        .setDeveloperKey(API_KEY)
        .addView(view)
        .addView(new google.picker.DocsUploadView())
        .setCallback(pickerCallback)
        .build();
    picker.setVisible(true);
  }

  function pickerCallback(data) {
    if (data.action == google.picker.Action.PICKED) {
      var files = [];
      for (var i = 0; i < data.docs.length; i++) {
        var doc = data.docs[i];
        files.push({
          id: doc.id,
          name: doc.name,
          mimeType: doc.mimeType
        });
      }
      var encoded = encodeURIComponent(JSON.stringify(files));
      window.location.href = SCHEME + '://picker?files=' + encoded;
    } else if (data.action == google.picker.Action.CANCEL) {
      window.location.href = SCHEME + '://picker?cancel=1';
    }
  }
</script>
</body>
</html>
